<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ASYNC WEATHER TRACKER</h1>

    <div id="search-box">
        <div id="first-search"> 
            <h3>Search City</h3>
            <form>
                <input type="text" id="search-city" placeholder="Enter city name">
                <button type="submit">Search</button>
            </form>
        </div>

        <div id="search-history">
            <h3>Search History</h3>
            <div id="search-cities">
                </div>
        </div>
    </div>

    <div id="weather-info">
        <h2>Weather Information</h2>
        <div id="weather-details">
            </div>
    </div>

    <script>
        let API = "0e361cdff3f3dee1687b2ac73cfaa7f9";
        let cityInput = document.querySelector("#search-city");
        let form = document.querySelector("form");
        let historyContainer = document.querySelector("#search-cities");
        let weatherdetails = document.querySelector("#weather-details");

        async function getweatherinfo(cityName) {
            let response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API}&units=metric`);
            let data = await response.json();
            let weatherdetails = document.querySelector("#weather-details")
            console.log(data)
            
            // Check if city exists before rendering
            if (data.cod === 200) {
                let card = document.createElement("div");
                card.className = "weather-card";
                card.innerHTML = `
                    <div><strong>City:</strong> ${data.name}</div>
                    <div><strong>Temperature:</strong> ${data.main.temp}°C</div>
                    <div><strong>Humidity:</strong> ${data.main.humidity}%</div>
                    <div><strong>Wind Speed:</strong> ${data.wind.speed}m/s</div>
                    <div><strong>Weather:</strong> ${data.weather[0].main}</div>
                `;   
                
                weatherdetails.innerHTML = "";
                weatherdetails.append(card);

                // Update LocalStorage and UI
                localStorage.setItem("cites", data.name);
                showHistory();
            } else {
                weatherdetails.innerHTML = "<div>City not found. Please try again.</div>";
            }
        } 

        function showHistory() {
            let savedCity = localStorage.getItem("cites");
            if (savedCity) {
                historyContainer.innerHTML = `<h4>${savedCity}</h4>`;
            }
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            getweatherinfo(cityInput.value);
            cityInput.value = ""; // Clear input after search
        });

        // Initial calls
        showHistory();
        getweatherinfo("delhi");

    </script>
</body>
</html>
